openapi: 3.0.3
info:
  title: SakeOfHer API
  version: 0.4.0
  description: |
    API проекта SakeOfHer для сайтного MVP.

    Endpoint-ы сделаны ресурсными, без role-prefix вроде `/admin`, `/bot`, `/site`.

    В этой версии сайт не создаёт платёж и не активирует подписку напрямую.
    Сайт только формирует Telegram deep-link с параметрами покупки или продления.
    Оплата и финальная активация выполняются на стороне Telegram-бота.
servers:
  - url: http://localhost:8080
    description: Local API
tags:
  - name: System
  - name: Tariffs
  - name: Checkout
  - name: Subscriptions
  - name: Users
  - name: Auth
paths:
  /api/v1/health:
    get:
      tags: [System]
      summary: Проверить, что API работает
      responses:
        '200':
          description: API работает
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'


  /api/v1/auth/telegram/oauth/start:
    get:
      tags: [Auth]
      summary: Начать Telegram OAuth 2.0 / OIDC вход
      description: |
        Создаёт state, PKCE verifier и nonce в HttpOnly cookies, затем редиректит пользователя на Telegram OAuth.
      responses:
        '302':
          description: Redirect to Telegram OAuth
        '200':
          description: "JSON с auth_url, если передать Accept: application/json или ?format=json"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelegramOAuthStart'

  /api/v1/auth/telegram/oauth/url:
    get:
      tags: [Auth]
      summary: Получить URL для Telegram OAuth 2.0 / OIDC
      responses:
        '200':
          description: Telegram OAuth URL
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TelegramOAuthStart'

  /api/v1/auth/telegram/oauth/callback:
    get:
      tags: [Auth]
      summary: Callback Telegram OAuth 2.0 / OIDC
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirect to frontend auth success page
        '200':
          description: "JSON-сессия, если передать Accept: application/json"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Получить текущего пользователя по access token/cookie
      responses:
        '200':
          description: Текущий пользователь
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMe'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Выйти и очистить auth-cookie
      responses:
        '200':
          description: OK

  /api/v1/tariffs:
    get:
      tags: [Tariffs]
      summary: Получить активные тарифы с ценами
      responses:
        '200':
          description: Список тарифов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TariffWithPrices'

  /api/v1/config:
    get:
      tags: [Checkout]
      summary: Получить настройки сайта
      description: Возвращает username Telegram-бота и базовую ссылку на него.
      responses:
        '200':
          description: Настройки сайта
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteConfig'

  /api/v1/checkout/purchase:
    post:
      tags: [Checkout]
      summary: Сформировать ссылку на покупку в Telegram-боте
      description: |
        Сайт не создаёт подписку и не принимает оплату.
        Endpoint валидирует тариф и лимит трафика, затем возвращает deep-link в Telegram-бот.

        Payload имеет вид `buy_t{tariff_id}_g{traffic_limit_gb}`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SitePurchaseLinkInput'
            example:
              tariff_id: 1
              traffic_limit_gb: 500
      responses:
        '200':
          description: Ссылка в Telegram-бот
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteCheckoutLink'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/checkout/renew:
    post:
      tags: [Checkout]
      summary: Сформировать ссылку на продление в Telegram-боте
      description: |
        При продлении лимит трафика не передаётся.
        Backend берёт лимит из текущей подписки и возвращает Telegram deep-link.

        Payload имеет вид `renew_{public_token}`.
        Бот по этому public_token сможет подтянуть тариф и текущий лимит.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SiteRenewLinkInput'
            example:
              public_token: 6d1f4e9c2a7b4d1fb9e0f1a2c3d4e5f6aabbccdd0011
      responses:
        '200':
          description: Ссылка продления в Telegram-боте
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteCheckoutLink'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/subscriptions/public/{public_token}:
    get:
      tags: [Subscriptions]
      summary: Получить публичную информацию о подписке
      parameters:
        - name: public_token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Данные подписки
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicSubscription'
        '404':
          $ref: '#/components/responses/NotFound'


  /api/v1/subscriptions/path/{subscription_path}/telegram/{telegram_id}:
    get:
      tags: [Subscriptions]
      summary: Получить публичную страницу подписки по telegram_id
      description: |
        Новый формат для страницы подписки вида:
        `https://0wn3d.h4ck.me/L0mENeiofHjdxC57/sub/970706613`.

        `subscription_path` должен совпадать с env `SUBSCRIPTION_PATH_SECRET`.
        `telegram_id` — Telegram ID пользователя.
      parameters:
        - name: subscription_path
          in: path
          required: true
          schema:
            type: string
          example: L0mENeiofHjdxC57
        - name: telegram_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 970706613
      responses:
        '200':
          description: Данные последней подписки пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicSubscription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/users/telegram:
    post:
      tags: [Users]
      summary: Создать или обновить пользователя по Telegram-данным
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelegramUserInput'
      responses:
        '200':
          description: Пользователь
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /api/v1/subscriptions/by-telegram/{telegram_id}:
    get:
      tags: [Subscriptions]
      summary: Получить активную подписку пользователя по telegram_id
      parameters:
        - name: telegram_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Активная подписка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicSubscription'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  responses:
    BadRequest:
      description: Некорректный запрос
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Сущность не найдена
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Нет авторизации
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:

    TelegramOAuthStart:
      type: object
      properties:
        auth_url:
          type: string
          example: https://oauth.telegram.org/auth?client_id=123&response_type=code
        state:
          type: string

    AuthSession:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_at:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/User'
        is_admin:
          type: boolean

    AuthMe:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        is_admin:
          type: boolean

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: invalid input

    SiteConfig:
      type: object
      properties:
        telegram_bot_username:
          type: string
          example: sakeofher_bot
        telegram_bot_url:
          type: string
          example: https://t.me/sakeofher_bot
        payments_location:
          type: string
          example: telegram_bot
        public_url:
          type: string
          example: https://0wn3d.h4ck.me
        subscription_path_secret:
          type: string
          example: L0mENeiofHjdxC57
        subscription_url_pattern:
          type: string
          example: https://0wn3d.h4ck.me/L0mENeiofHjdxC57/sub/{telegram_id}

    SitePurchaseLinkInput:
      type: object
      required: [tariff_id, traffic_limit_gb]
      properties:
        tariff_id:
          type: integer
          format: int64
          example: 1
        traffic_limit_gb:
          type: integer
          format: int64
          example: 500

    SiteRenewLinkInput:
      type: object
      required: [public_token]
      properties:
        public_token:
          type: string
          example: 6d1f4e9c2a7b4d1fb9e0f1a2c3d4e5f6aabbccdd0011

    SiteCheckoutLink:
      type: object
      properties:
        action:
          type: string
          enum: [purchase, renew]
          example: purchase
        start_payload:
          type: string
          example: buy_t1_g500
        telegram_bot_url:
          type: string
          example: https://t.me/sakeofher_bot?start=buy_t1_g500
        telegram_bot_username:
          type: string
          example: sakeofher_bot
        tariff:
          $ref: '#/components/schemas/Tariff'
        traffic_limit_gb:
          type: integer
          format: int64
          example: 500
        traffic_limit_bytes:
          type: integer
          format: int64
          example: 536870912000
        public_token:
          type: string
          nullable: true
        current_expires_at:
          type: string
          format: date-time
          nullable: true
        next_expires_at_preview:
          type: string
          format: date-time
        note:
          type: string

    TelegramUserInput:
      type: object
      required: [telegram_id]
      properties:
        telegram_id:
          type: integer
          format: int64
        telegram_username:
          type: string
          nullable: true
        telegram_first_name:
          type: string
          nullable: true
        telegram_last_name:
          type: string
          nullable: true
        language_code:
          type: string
          nullable: true

    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        telegram_id:
          type: integer
          format: int64
        telegram_username:
          type: string
          nullable: true
        telegram_first_name:
          type: string
          nullable: true
        telegram_last_name:
          type: string
          nullable: true
        remna_status:
          type: string

    Tariff:
      type: object
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        duration_days:
          type: integer
        period_days:
          type: integer
        traffic_limit_bytes:
          type: integer
          format: int64
        is_active:
          type: boolean
        sort_order:
          type: integer

    TariffPrice:
      type: object
      properties:
        id:
          type: integer
          format: int64
        tariff_id:
          type: integer
          format: int64
        provider:
          type: string
        payment_method:
          type: string
        currency:
          type: string
        amount_minor:
          type: integer
          format: int64
          nullable: true
        stars_amount:
          type: integer
          format: int64
          nullable: true
        accepted_assets:
          type: array
          items:
            type: string
        is_active:
          type: boolean

    TariffWithPrices:
      allOf:
        - $ref: '#/components/schemas/Tariff'
        - type: object
          properties:
            prices:
              type: array
              items:
                $ref: '#/components/schemas/TariffPrice'

    Subscription:
      type: object
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        tariff_id:
          type: integer
          format: int64
          nullable: true
        status:
          type: string
        started_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        current_period_start:
          type: string
          format: date-time
        current_period_end:
          type: string
          format: date-time
        traffic_limit_bytes:
          type: integer
          format: int64
        traffic_used_bytes:
          type: integer
          format: int64
        period_status:
          type: string
        public_token:
          type: string

    PublicSubscription:
      type: object
      properties:
        subscription:
          $ref: '#/components/schemas/Subscription'
        user:
          $ref: '#/components/schemas/User'
        tariff:
          $ref: '#/components/schemas/Tariff'
        subscription_url:
          type: string
          nullable: true
