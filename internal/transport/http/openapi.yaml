openapi: 3.0.3
info:
  title: SakeOfHer API
  version: 0.5.0
  description: |
    API проекта SakeOfHer.

    Endpoint-ы сделаны ресурсными, без role-prefix вроде `/admin`, `/bot`, `/site`.

    Сайт не создаёт платёж и не активирует подписку напрямую.
    Сайт формирует Telegram deep-link с параметрами покупки или продления.
    Оплата и финальная активация выполняются на стороне Telegram-бота.

servers:
  - url: http://localhost:8080
    description: Local API

tags:
  - name: System
  - name: Auth
  - name: Config
  - name: Tariffs
  - name: Checkout
  - name: Subscriptions
  - name: Users

security: []

paths:
  /api/v1/health:
    get:
      tags: [System]
      summary: Проверить, что API работает
      responses:
        '200':
          description: API работает
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Войти по логину и паролю
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        '200':
          description: Успешный вход
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSession'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Получить текущего пользователя по access token/cookie
      responses:
        '200':
          description: Текущий пользователь
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMe'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Выйти и очистить auth-cookie
      responses:
        '200':
          description: OK

  /api/v1/config:
    get:
      tags: [Config]
      summary: Получить настройки сайта
      description: Возвращает username Telegram-бота и базовую ссылку на него.
      responses:
        '200':
          description: Настройки сайта
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteConfig'

  /api/v1/tariffs:
    get:
      tags: [Tariffs]
      summary: Получить активные тарифы с ценами
      responses:
        '200':
          description: Список активных тарифов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TariffWithPrices'
    post:
      tags: [Tariffs]
      summary: Создать тариф
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTariffInput'
      responses:
        '201':
          description: Тариф создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tariff'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/tariffs/all:
    get:
      tags: [Tariffs]
      summary: Получить все тарифы для админки
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Список всех тарифов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Tariff'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/tariffs/{id}:
    get:
      tags: [Tariffs]
      summary: Получить тариф по ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Тариф
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tariff'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Tariffs]
      summary: Обновить тариф
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTariffInput'
      responses:
        '200':
          description: Тариф обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tariff'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/tariffs/{id}/enable:
    post:
      tags: [Tariffs]
      summary: Включить тариф
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Тариф включён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tariff'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/tariffs/{id}/disable:
    post:
      tags: [Tariffs]
      summary: Отключить тариф
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Тариф отключён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tariff'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/checkout/purchase:
    post:
      tags: [Checkout]
      summary: Сформировать ссылку на покупку в Telegram-боте
      description: |
        Сайт не создаёт подписку и не принимает оплату.
        Endpoint валидирует тариф и лимит трафика, затем возвращает deep-link в Telegram-бот.

        Payload имеет вид `buy_t{tariff_id}_g{traffic_limit_gb}`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SitePurchaseLinkInput'
            example:
              tariff_id: 1
              traffic_limit_gb: 500
      responses:
        '200':
          description: Ссылка в Telegram-бот
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteCheckoutLink'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/checkout/renew:
    post:
      tags: [Checkout]
      summary: Сформировать ссылку на продление в Telegram-боте
      description: |
        При продлении лимит трафика не передаётся.
        Backend берёт лимит из текущей подписки и возвращает Telegram deep-link.

        Payload имеет вид `renew_{public_token}`.
        Бот по этому public_token сможет подтянуть тариф и текущий лимит.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SiteRenewLinkInput'
            example:
              public_token: 6d1f4e9c2a7b4d1fb9e0f1a2c3d4e5f6aabbccdd0011
      responses:
        '200':
          description: Ссылка продления в Telegram-боте
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteCheckoutLink'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/users/telegram:
    post:
      tags: [Users]
      summary: Создать или обновить пользователя по Telegram-данным
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TelegramUserInput'
      responses:
        '200':
          description: Пользователь
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  /api/v1/users:
    get:
      tags: [Users]
      summary: Получить пользователей для админки
      security:
        - bearerAuth: []
      parameters:
        - name: query
          in: query
          schema:
            type: string
          description: Поиск по username, имени, alias или telegram_id
        - name: status
          in: query
          schema:
            type: string
            enum: [active, blocked, deleted]
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Список пользователей
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/users/{id}:
    get:
      tags: [Users]
      summary: Получить пользователя по ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Пользователь
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Users]
      summary: Обновить пользователя
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserInput'
      responses:
        '200':
          description: Пользователь обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/users/{id}/block:
    post:
      tags: [Users]
      summary: Заблокировать пользователя
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Пользователь заблокирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/users/{id}/unblock:
    post:
      tags: [Users]
      summary: Разблокировать пользователя
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Пользователь разблокирован
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/users/{id}/delete:
    post:
      tags: [Users]
      summary: Мягко удалить пользователя
      description: Физически пользователь не удаляется, статус меняется на `deleted`.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Пользователь помечен удалённым
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/subscriptions/public/{public_token}:
    get:
      tags: [Subscriptions]
      summary: Получить публичную информацию о подписке
      parameters:
        - name: public_token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Данные подписки
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicSubscription'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/subscriptions/path/{subscription_path}/telegram/{telegram_id}:
    get:
      tags: [Subscriptions]
      summary: Получить публичную страницу подписки по telegram_id
      description: |
        Новый формат для страницы подписки вида:
        `https://0wn3d.h4ck.me/L0mENeiofHjdxC57/sub/970706613`.

        `subscription_path` должен совпадать с env `SUBSCRIPTION_PATH_SECRET`.
        `telegram_id` — Telegram ID пользователя.
      parameters:
        - name: subscription_path
          in: path
          required: true
          schema:
            type: string
          example: L0mENeiofHjdxC57
        - name: telegram_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 970706613
      responses:
        '200':
          description: Данные последней подписки пользователя
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicSubscription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/subscriptions/by-telegram/{telegram_id}:
    get:
      tags: [Subscriptions]
      summary: Получить активную подписку пользователя по telegram_id
      parameters:
        - name: telegram_id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Активная подписка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicSubscription'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/subscriptions:
    get:
      tags: [Subscriptions]
      summary: Получить подписки для админки
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: query
          schema:
            type: integer
            format: int64
        - name: telegram_id
          in: query
          schema:
            type: integer
            format: int64
        - name: status
          in: query
          schema:
            type: string
            enum: [active, expired, cancelled]
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Список подписок
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubscriptionListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Subscriptions]
      summary: Вручную выдать подписку
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateManualSubscriptionInput'
      responses:
        '201':
          description: Подписка выдана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicSubscription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/subscriptions/{id}:
    get:
      tags: [Subscriptions]
      summary: Получить подписку по ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Подписка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicSubscription'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Subscriptions]
      summary: Обновить подписку вручную
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSubscriptionInput'
      responses:
        '200':
          description: Подписка обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicSubscription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/subscriptions/{id}/extend:
    post:
      tags: [Subscriptions]
      summary: Продлить подписку
      description: |
        Если `tariff_id` не передан, используется тариф текущей подписки.
        Если `days` не передан, используется длительность тарифа.
        Лимит трафика при продлении не суммируется и берётся из текущей подписки.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExtendSubscriptionInput'
      responses:
        '200':
          description: Подписка продлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicSubscription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/subscriptions/{id}/traffic-limit:
    patch:
      tags: [Subscriptions]
      summary: Изменить лимит трафика подписки
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTrafficLimitInput'
      responses:
        '200':
          description: Лимит обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicSubscription'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/subscriptions/{id}/disable:
    post:
      tags: [Subscriptions]
      summary: Отключить подписку
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Подписка отключена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicSubscription'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/subscriptions/{id}/enable:
    post:
      tags: [Subscriptions]
      summary: Включить подписку
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Подписка включена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicSubscription'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/subscriptions/{id}/cancel:
    post:
      tags: [Subscriptions]
      summary: Отменить подписку
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ID'
      responses:
        '200':
          description: Подписка отменена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicSubscription'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 50
        maximum: 200
    Offset:
      name: offset
      in: query
      schema:
        type: integer
        default: 0

  responses:
    BadRequest:
      description: Некорректный запрос
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Нет авторизации
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Недостаточно прав
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Сущность не найдена
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: invalid input

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          format: password

    AuthSession:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_at:
          type: string
          format: date-time
        username:
          type: string
        is_admin:
          type: boolean

    AuthMe:
      type: object
      properties:
        username:
          type: string
        is_admin:
          type: boolean

    SiteConfig:
      type: object
      properties:
