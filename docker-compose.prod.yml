services:
  postgres:
    image: postgres:18.3
    container_name: sakeofher-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sakeofher}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sakeofher_password}
      POSTGRES_DB: ${POSTGRES_DB:-sakeofher}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sakeofher} -d ${POSTGRES_DB:-sakeofher}"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:4
    container_name: sakeofher-migrate
    restart: "no"
    volumes:
      - ./migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://${POSTGRES_USER:-sakeofher}:${POSTGRES_PASSWORD:-sakeofher_password}@postgres:5432/${POSTGRES_DB:-sakeofher}?sslmode=disable"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
      args:
        APP_CMD: api
    container_name: sakeofher-api
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      HTTP_ADDR: :8080
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "8080"

  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
      args:
        APP_CMD: bot
    container_name: sakeofher-bot
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
      args:
        APP_CMD: worker
    container_name: sakeofher-worker
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: sakeofher-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  postgres_data:
