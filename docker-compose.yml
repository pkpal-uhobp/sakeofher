services:
  sakeofher-postgres:
    image: postgres:18.3-bookworm
    container_name: sakeofher-env-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      # Named volume лучше для Windows: меньше проблем с правами и битым bind-mount.
      - sakeofher-postgres-data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} -h 127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  sakeofher-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations
    depends_on:
      sakeofher-postgres:
        condition: service_healthy
    profiles:
      - tools

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: sakeofher-postgres-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:sakeofher-postgres:5432
    ports:
      - "127.0.0.1:5433:5432"
    depends_on:
      sakeofher-postgres:
        condition: service_healthy
    profiles:
      - dev

  sakeofher-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
      args:
        APP_CMD: api
    container_name: sakeofher-api
    env_file:
      - .env
    environment:
      HTTP_ADDR: :8080
      POSTGRES_HOST: sakeofher-postgres
      POSTGRES_PORT: 5432
      LOGGER_FOLDER: /app/out/logs
    volumes:
      - ${PROJECT_ROOT}/out/logs:/app/out/logs
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      sakeofher-postgres:
        condition: service_healthy
    restart: always
    profiles:
      - app
      - prod

  sakeofher-bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
      args:
        APP_CMD: bot
    container_name: sakeofher-bot
    env_file:
      - .env
    environment:
      POSTGRES_HOST: sakeofher-postgres
      POSTGRES_PORT: 5432
      LOGGER_FOLDER: /app/out/logs
    volumes:
      - ${PROJECT_ROOT}/out/logs:/app/out/logs
    depends_on:
      sakeofher-postgres:
        condition: service_healthy
    restart: always
    profiles:
      - app
      - prod

  sakeofher-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
      args:
        APP_CMD: worker
    container_name: sakeofher-worker
    env_file:
      - .env
    environment:
      POSTGRES_HOST: sakeofher-postgres
      POSTGRES_PORT: 5432
      LOGGER_FOLDER: /app/out/logs
    volumes:
      - ${PROJECT_ROOT}/out/logs:/app/out/logs
    depends_on:
      sakeofher-postgres:
        condition: service_healthy
    restart: always
    profiles:
      - app
      - prod

  sakeofher-frontend-dev:
    image: node:22-bookworm-slim
    container_name: sakeofher-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --force"
    volumes:
      - ${PROJECT_ROOT}/frontend:/app
      - sakeofher-frontend-node-modules:/app/node_modules
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      VITE_API_BASE_URL: /api/v1
      VITE_DEV_PROXY_TARGET: http://host.docker.internal:8080
      CHOKIDAR_USEPOLLING: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - frontend-dev

  sakeofher-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: sakeofher-frontend
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - sakeofher-api
    restart: always
    profiles:
      - prod

volumes:
  sakeofher-postgres-data:
  sakeofher-frontend-node-modules:
